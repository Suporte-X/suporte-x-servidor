name: Retenção diária do Firestore

on:
  schedule:
    - cron: "17 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firestore-retention-production
  cancel-in-progress: false

jobs:
  cleanup:
    name: Limpar dados temporários expirados
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Baixar código
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09

      - name: Configurar Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Instalar dependências
        run: npm ci --prefix server

      - name: Aplicar retenção
        env:
          FIREBASE_PROJECT_ID: suporte-x-19ae8
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: npm run firestore:cleanup:execute
