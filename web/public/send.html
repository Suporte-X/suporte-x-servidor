<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Compartilhar Tela • Suporte X</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="/icon-192.png">
</head>
<body>
  <div class="card">
    <h1>Cliente: Compartilhar Tela</h1>
    <p class="muted">1) Toque em <b>Gerar código</b>. 2) Envie o <b>código</b> para o técnico. 3) Toque em <b>Iniciar compartilhamento</b> e confirme <b>Iniciar agora</b>.</p>
    <div class="row">
      <input id="room" type="text" placeholder="Código da sessão (6 dígitos)" />
      <button id="gen">Gerar código</button>
    </div>
    <p class="muted">Código: <span id="rc" class="roomcode">—</span></p>
    <div class="row" style="margin-top:10px;">
      <button id="start" disabled>Iniciar compartilhamento</button>
      <button id="stop" disabled>Parar</button>
    </div>
    <p class="muted" id="status">Aguardando…</p>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/common.js"></script>
    <script>
      const roomInput = qs('#room');
      const rc = qs('#rc');
      const startBtn = qs('#start');
      const stopBtn = qs('#stop');
      const statusEl = qs('#status');
      const FIREBASE_AUTH_MODULE = 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

      const roomFromURL = getRoomFromQuery();
      if (roomFromURL) {
        roomInput.value = roomFromURL;
        rc.textContent = roomFromURL;
        startBtn.disabled = false;
      }

      qs('#gen').onclick = () => {
        const r = randomRoom();
        roomInput.value = r;
        rc.textContent = r;
        startBtn.disabled = false;
      };

      let pc, socket, stream;
      let firebaseAuthSdkPromise = null;

      function iceServers(){
        const s = [{ urls: 'stun:stun.l.google.com:19302' }];
        // Opcional: adicione TURN aqui depois (urls, username, credential)
        return s;
      }

      function getFirebaseAuthSdk() {
        if (!firebaseAuthSdkPromise) {
          firebaseAuthSdkPromise = import(FIREBASE_AUTH_MODULE);
        }
        return firebaseAuthSdkPromise;
      }

      async function ensureClientIdToken(forceRefresh = false) {
        const [{ ensureFirebaseAuth }, { signInAnonymously }] = await Promise.all([
          import('/firebase-client.js'),
          getFirebaseAuthSdk(),
        ]);
        const auth = ensureFirebaseAuth();
        if (!auth.currentUser) {
          await signInAnonymously(auth);
        }
        const user = auth.currentUser;
        if (!user) throw new Error('auth_required');
        const token = await user.getIdToken(forceRefresh);
        if (!token) throw new Error('missing_token');
        return token;
      }

      function connectSocketWithAuth() {
        return io(window.location.origin, {
          auth: (cb) => {
            ensureClientIdToken(false)
              .then((token) => cb({ token, panel: 'client', requireAuth: true }))
              .catch(() => cb({ panel: 'client', requireAuth: true }));
          },
        });
      }

      function joinLegacyRoom(activeSocket, room, idToken) {
        return new Promise((resolve, reject) => {
          let settled = false;
          const timer = setTimeout(() => {
            if (settled) return;
            settled = true;
            reject(new Error('join_timeout'));
          }, 10000);
          activeSocket.emit('join', { room, role: 'client', idToken }, (ack) => {
            if (settled) return;
            settled = true;
            clearTimeout(timer);
            if (ack && ack.ok) {
              resolve(ack);
              return;
            }
            reject(new Error((ack && ack.err) || 'join_failed'));
          });
        });
      }

      function describeJoinError(code) {
        if (code === 'missing_token' || code === 'invalid_token') {
          return 'Falha de autenticação para entrar na sessão.';
        }
        if (code === 'forbidden') {
          return 'A conta autenticada não tem acesso a esta sessão.';
        }
        if (code === 'join_timeout') {
          return 'Tempo esgotado ao entrar na sessão.';
        }
        return 'Não foi possível entrar na sessão.';
      }

      async function start() {
        const room = roomInput.value.trim();
        if (!room) { alert('Informe o código da sessão'); return; }
        startBtn.disabled = true;

        let joinToken = '';
        try {
          joinToken = await ensureClientIdToken(false);
        } catch (err) {
          console.error('client auth error:', err);
          setStatus('Falha ao autenticar o cliente para iniciar a sessão.');
          alert('Não foi possível autenticar este dispositivo. Tente novamente.');
          startBtn.disabled = false;
          return;
        }

        socket = connectSocketWithAuth();
        socket.on('connect_error', (error) => {
          const reason = String(error?.message || error?.description || '');
          setStatus(`Erro de conexão: ${reason || 'falha de autenticação/socket'}`);
        });
        socket.on('peer-left', () => setStatus('Visualizador saiu.'));
        socket.on('signal', async (data) => {
          if (data.type === 'answer') {
            await pc.setRemoteDescription(data);
            setStatus('Conectado!');
          } else if (data.candidate) {
            try { await pc.addIceCandidate(data); } catch (e){ console.error(e); }
          }
        });

        try {
          await joinLegacyRoom(socket, room, joinToken);
        } catch (err) {
          const code = err && err.message ? err.message : 'join_failed';
          console.error('legacy join failed:', code);
          const msg = describeJoinError(code);
          setStatus(msg);
          alert(msg);
          if (socket) {
            socket.disconnect();
            socket = null;
          }
          startBtn.disabled = false;
          return;
        }

        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
            setStatus('Seu navegador não permite captura de tela (getDisplayMedia indisponível).');
            alert('Este navegador/ambiente não permite captura de tela. No Android, o Chrome móvel costuma bloquear.\nSolução definitiva: use o app nativo Suporte X.');
            startBtn.disabled = false;
            return;
          }

          stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: false });
          setStatus('Compartilhando tela… aguarde o técnico informar o código.');
        } catch (err) {
          console.error('getDisplayMedia error:', err);
          setStatus(`Falha ao iniciar compartilhamento: ${err.name} — ${err.message}`);
          alert(`Não foi possível iniciar a captura de tela.\n${err.name}: ${err.message}\n\nEm Android, o Chrome móvel frequentemente bloqueia. Solução definitiva: app nativo Suporte X.`);
          if (socket) {
            socket.disconnect();
            socket = null;
          }
          startBtn.disabled = false;
          return;
        }

        pc = new RTCPeerConnection({ iceServers: iceServers() });
        stream.getTracks().forEach(t => pc.addTrack(t, stream));

        pc.onicecandidate = e => {
          if (e.candidate) socket.emit('signal', { room, data: e.candidate });
        };

        // Criar a oferta logo após iniciar o compartilhamento
        let lastOffer = null;

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal', { room, data: offer });
        lastOffer = offer;
        setStatus('Enviando oferta (offer) ao visualizador…');

        // Se alguém entrar depois, reenvia a offer
        socket.on('peer-joined', () => {
          setStatus('Visualizador entrou. Aguardando resposta (answer)…');
          if (lastOffer) socket.emit('signal', { room, data: lastOffer });
        });

        stopBtn.disabled = false;
      }

      function stopShare(){
        if (stream) stream.getTracks().forEach(t => t.stop());
        if (pc) pc.close();
        if (socket) socket.disconnect();
        startBtn.disabled = false;
        stopBtn.disabled = true;
        setStatus('Parado.');
      }

      function setStatus(msg){ statusEl.textContent = msg; }

      startBtn.onclick = start;
      stopBtn.onclick = stopShare;
    </script>
  </div>
  <script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js')
    .then(() => console.log('Service Worker registrado!'))
    .catch(err => console.error('Erro ao registrar SW:', err));
}
</script>
</body>
</html>
